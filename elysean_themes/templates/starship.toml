# elysean_themes/templates/starship.toml


format = """
в•ӯв”Җ\
[оӮ¶](fg:{{ colors.ACCENT_MUTED | rgb }})\
[$os$username](bold bg:{{ colors.ACCENT_MUTED | rgb }} fg:{{ colors.BG_DARK | rgb }})\
[оӮҙ](fg:{{ colors.ACCENT_MUTED | rgb }})\
[ оӮ¶](fg:{{ colors.ACCENT | rgb }})\
$directory\
[оӮ°](fg:{{ colors.ACCENT | rgb }})\
$fill\
$git_branch\
$git_status\
\nв•°в”Җв”Җ\
$character"""

[fill]
symbol = "В·"
style = "fg:{{ colors.SURFACE | rgb }}"

[character]
success_symbol = "[вқҜ](bold fg:{{ colors.ACCENT | rgb }})"
error_symbol = "[вқҜ](bold fg:{{ colors.ERROR | rgb }})"

[os]
disabled = false
style = "bold bg:{{ colors.ACCENT_MUTED | rgb }} fg:{{ colors.BG_DARK | rgb }}"

[os.symbols]
Arch = "пҢғ "
Ubuntu = "пҢӣ "
Fedora = "пҢҠ "
NixOS = "пҢ“ "
Debian = "пҢҶ "
CachyOS = "пҢғ "

[hostname]
ssh_only = false
trim_at = "."
style = "bold fg:{{ colors.BG_DARK | rgb }} bg:{{ colors.ACCENT_MUTED | rgb }}"
format = "[$hostname]($style)"

[username]
show_always = true
format = "[$user](bold bg:{{ colors.ACCENT_MUTED | rgb }} fg:{{ colors.BG_DARK | rgb }})"

[directory]
style = "bold fg:{{ colors.FG | rgb }} bg:{{ colors.ACCENT | rgb }}"
format = "[у°ү– уұҰ° $path]($style)"
truncation_length = 5
truncation_symbol = "../"
home_symbol = "~"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"~" = "пҖ• "

[git_branch]
symbol = "пҗҳ "
style = "bg:{{ colors.SURFACE | rgb }}"
format = '[оӮІ](fg:{{ colors.ACCENT | rgb }})[[ $symbol$branch ](bold fg:{{ colors.FG | rgb }} bg:{{ colors.ACCENT | rgb }})]($style)'

[git_status]
style = "bg:{{ colors.ACCENT | rgb }}"
format = '[[($all_status$ahead_behind )](bold fg:{{ colors.FG | rgb }} bg:{{ colors.ACCENT | rgb }})]($style)[оӮҙ](fg:{{ colors.ACCENT | rgb }})'

[nodejs]
symbol = "оңҳ "
style = "bg:{{ colors.BG_HIGHLIGHT | rgb }}"
format = '[[ $symbol ($version) ](fg:{{ colors.ACCENT | rgb }} bg:{{ colors.BG_HIGHLIGHT | rgb }})]($style)'

[rust]
symbol = "оһЁ "
style = "bg:{{ colors.BG_HIGHLIGHT | rgb }}"
format = '[[ $symbol ($version) ](fg:{{ colors.ACCENT | rgb }} bg:{{ colors.BG_HIGHLIGHT | rgb }})]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:{{ colors.BG_HIGHLIGHT | rgb }}"
format = '[[ $symbol ($version) ](fg:{{ colors.ACCENT | rgb }} bg:{{ colors.BG_HIGHLIGHT | rgb }})]($style)'

[php]
symbol = "оҳҲ "
style = "bg:{{ colors.BG_HIGHLIGHT | rgb }}"
format = '[[ $symbol ($version) ](fg:{{ colors.ACCENT | rgb }} bg:{{ colors.BG_HIGHLIGHT | rgb }})]($style)'

[python]
symbol = "оңј "
style = "bg:{{ colors.BG_HIGHLIGHT | rgb }}"
format = '[[ $symbol($version) ](bold fg:{{ colors.ACCENT | rgb }} bg:{{ colors.BG_HIGHLIGHT | rgb }})]($style)'
