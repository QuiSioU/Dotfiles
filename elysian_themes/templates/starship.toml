# elysian_themes/templates/starship.toml


format = """
в•ӯв”Җ\
[оӮ¶](fg:{{ colors.FG_LIGHT }})\
[$os$username](bg:{{ colors.FG_LIGHT }} fg:{{ colors.BG_DARK }})\
[оӮҙ](fg:{{ colors.FG_LIGHT }})\
[ оӮ¶](fg:{{ colors.FG_DISABLED }})\
$directory\
[оӮ°](fg:{{ colors.FG_DISABLED }})\
$fill\
$git_branch\
$git_status\
\nв•°в”Җв”Җ\
$character"""

[fill]
symbol = "В·"
style = "fg:{{ colors.FG_DISABLED }}"

[character]
success_symbol = "[вқҜ](bold fg:{{ colors.INFO }})"
error_symbol = "[вқҜ](bold fg:{{ colors.ERROR }})"

[os]
disabled = false
style = "bold bg:{{ colors.FG_LIGHT }} fg:{{ colors.BG_DARK }}"

[os.symbols]
Arch = "пҢғ "
Ubuntu = "пҢӣ "
Fedora = "пҢҠ "
NixOS = "пҢ“ "
Debian = "пҢҶ "
CachyOS = "пҢғ "

[hostname]
ssh_only = false
trim_at = "."
style = "bold fg:{{ colors.BG_DARK }} bg:{{ colors.FG_LIGHT }}"
format = "[$hostname]($style)"

[username]
show_always = true
format = "[$user](bold bg:{{ colors.FG_LIGHT }} fg:{{ colors.BG_DARK }})"

[directory]
style = "fg:{{ colors.FG }} bg:{{ colors.FG_DISABLED }}"
format = "[у°ү– уұҰ° $path]($style)"
truncation_length = 5
truncation_symbol = "../"
home_symbol = "~"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"~" = "пҖ• "

[git_branch]
symbol = "пҗҳ "
style = "bg:{{ colors.BG_HIGHLIGHT }}"
format = '[оӮІ](fg:{{ colors.FG_DISABLED }})[[ $symbol$branch ](fg:{{ colors.FG }} bg:{{ colors.FG_DISABLED }})]($style)'

[git_status]
style = "bg:{{ colors.FG_DISABLED }}"
format = '[[($all_status$ahead_behind )](fg:{{ colors.FG }} bg:{{ colors.FG_DISABLED }})]($style)[оӮҙ](fg:{{ colors.FG_DISABLED }})'

[nodejs]
symbol = "оңҳ "
style = "bg:{{ colors.BG_STRIPE }}"
format = '[[ $symbol ($version) ](fg:{{ colors.FG_DISABLED }} bg:{{ colors.BG_STRIPE }})]($style)'

[rust]
symbol = "оһЁ "
style = "bg:{{ colors.BG_STRIPE }}"
format = '[[ $symbol ($version) ](fg:{{ colors.FG_DISABLED }} bg:{{ colors.BG_STRIPE }})]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:{{ colors.BG_STRIPE }}"
format = '[[ $symbol ($version) ](fg:{{ colors.FG_DISABLED }} bg:{{ colors.BG_STRIPE }})]($style)'

[php]
symbol = "оҳҲ "
style = "bg:{{ colors.BG_STRIPE }}"
format = '[[ $symbol ($version) ](fg:{{ colors.FG_DISABLED }} bg:{{ colors.BG_STRIPE }})]($style)'

[python]
symbol = "оңј "
style = "bg:{{ colors.BG_STRIPE }}"
format = '[[ $symbol($version) ](bold fg:{{ colors.FG_DISABLED }} bg:{{ colors.BG_STRIPE }})]($style)'
