[opener]
vscodium = [
    { run = 'codium "$@"', desc = "VSCodium", block = false }
]
nvim = [
    { run = 'nvim "$@"', block = true }
]
default = [
    { run = 'xdg-open "$@"', block = false }
]


[open]
rules = [

    ######################
    # JSON / IPYNB RULES #
    ######################
    { url = "*.ipynb", use = "vscodium" },
    { mime = "application/json", use = "nvim" },

    ##############
    # TEXT FILES #
    ##############
    { mime = "text/*", use = "nvim" },
    
    #############################
    # OTHER APPLICATION/* FILES #
    #############################
    { mime = "application/octet-stream", use = "nvim" },

    ###########
    # SVG+XML #
    ###########
    { mime = "image/svg+xml", use = "nvim" },

    ###########
    # DEFAULT #
    ###########
    { mime = "*/*", use = "default" }
]
