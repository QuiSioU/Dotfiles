# starship/starship.toml


# add_newline = false

format = """
[оВґ](fg:#c1cdee)\
[пМГ ](bg:#c1cdee fg:#090c0c)\
[оВі](bg:#a3aed2 fg:#c1cdee)\
[ $hostname#$username ](bold bg:#a3aed2 fg:#090c0c)\
[оВі](bg:#769ff0 fg:#a3aed2)\
$directory\
[оВі](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оВі ](fg:#394260)"""
# $python\
# [оВі ](fg:#212736)"""

[hostname]
ssh_only = false
trim_at = "."
style = "bold fg:#090c0c bg:#a3aed2"
format = "[$hostname]($style)"

[username]
show_always = true
format = "[$user](bold fg:#090c0c bg:#a3aed2)"

[directory]
style = "bold fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "../"
home_symbol = "~"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "
"~" = "пАХ "

[git_branch]
symbol = "пРШ "
style = "bg:#394260"
format = '[[ $symbol$branch ](bold fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#212736"
format = '[[($all_status$ahead_behind )](bold fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "оЬШ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оЮ® "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оШІ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оШИ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = "оЬЉ "
style = "bg:#212736"
format = '[[ $symbol($version) ](bold fg:#769ff0 bg:#212736)]($style)'

