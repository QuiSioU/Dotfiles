# starship/starship.toml


# add_newline = false

format = """
в•ӯв”Җ\
[оӮ¶](fg:#c1cdee)\
[пҢғ ](bg:#c1cdee fg:#090c0c)\
[оӮҙ](bg:#a3aed2 fg:#c1cdee)\
[ $hostname#$username ](bold bg:#a3aed2 fg:#090c0c)\
[оӮҙ](bg:#769ff0 fg:#a3aed2)\
$directory\
[оӮ°](fg:#769ff0)\
$fill\
$git_branch\
$git_status\
\nв•°в”Җв”Җ\
$character"""

[fill]
symbol = "В·"
style = "fg:#394260"

[character]
success_symbol = "[вқҜ](bold fg:#769ff0)"
error_symbol = "[вқҜ](bold fg:#e06c75)"

[hostname]
ssh_only = false
trim_at = "."
style = "bold fg:#090c0c bg:#a3aed2"
format = "[$hostname]($style)"

[username]
show_always = true
format = "[$user](bold fg:#090c0c bg:#a3aed2)"

[directory]
style = "bold fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "../"
home_symbol = "~"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"~" = "пҖ• "

[git_branch]
symbol = "пҗҳ "
style = "bg:#394260"
format = '[оӮІ](fg:#769ff0)[[ $symbol$branch ](bold fg:#e3e5e5 bg:#769ff0)]($style)'

[git_status]
style = "bg:#769ff0"
format = '[[($all_status$ahead_behind )](bold fg:#e3e5e5 bg:#769ff0)]($style)[оӮҙ](fg:#769ff0)'

[nodejs]
symbol = "оңҳ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оҳҲ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = "оңј "
style = "bg:#212736"
format = '[[ $symbol($version) ](bold fg:#769ff0 bg:#212736)]($style)'

